name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual trigger for diagnosing the build without minting a release. A
  # workflow_dispatch run (no version tag) builds + notarizes + Gatekeeper-verifies
  # but the publish steps below are guarded on a tag ref, so it never publishes.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    # Backstop: never let a hung step burn GitHub's 6h job cap again. Resolve and
    # Archive also carry their own tighter step-level timeout-minutes so they fail
    # fast and the always() diagnostics-upload step still runs.
    timeout-minutes: 45
    env:
      SCHEME: FortAbodeUtilityCentral
      PRODUCT_NAME: "Fort Abode Utility Central"
      # Any git credential prompt fails immediately instead of blocking forever on a
      # TTY that never answers. This is the lever that converts the v3.12.1 6h Archive
      # hang (private SPM clone waiting on auth) into a fast, legible error.
      GIT_TERMINAL_PROMPT: "0"
      GIT_ASKPASS: /usr/bin/echo

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version
        run: |
          YML_VERSION=$(grep 'MARKETING_VERSION:' FortAbodeUtilityCentral/project.yml | sed 's/.*"\(.*\)"/\1/')
          BUILD_NUMBER=$(grep 'CURRENT_PROJECT_VERSION:' FortAbodeUtilityCentral/project.yml | sed 's/.*"\(.*\)"/\1/')
          if [ "${GITHUB_REF}" = "${GITHUB_REF#refs/tags/v}" ]; then
            # No version tag (workflow_dispatch / branch run) — diagnostics mode, no publish.
            echo "No version tag (ref=${GITHUB_REF}) — diagnostics run using project.yml v${YML_VERSION}"
            VERSION="${YML_VERSION}"
          else
            TAG="${GITHUB_REF#refs/tags/v}"
            if [ "$TAG" != "$YML_VERSION" ]; then
              echo "::error::Tag v${TAG} does not match project.yml version ${YML_VERSION}"
              exit 1
            fi
            VERSION="${TAG}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> $GITHUB_ENV
          echo "Validated: v${VERSION} (build ${BUILD_NUMBER})"

      - name: Set up code signing
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$P12_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm $RUNNER_TEMP/cert.p12

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=${KEYCHAIN_PASSWORD}" >> $GITHUB_ENV

      - name: Configure git for private SPM access
        env:
          SPM_PAT: ${{ secrets.SPM_PAT }}
        run: |
          # Rewrites every github.com clone URL to include the PAT so xcodebuild
          # -resolvePackageDependencies can clone private deps (AlignedDesignSystem).
          # Without this the runner has no auth for non-FortAbodeUtilityCentral repos.
          git config --global url."https://x-access-token:${SPM_PAT}@github.com/".insteadOf "https://github.com/"

      - name: Start diagnostics heartbeat
        run: |
          # Background breadcrumb logger covering Resolve + Archive — the real private-SPM
          # clone now happens in Resolve (the old broken `timeout` made it fall through to
          # Archive). Every 30s it records which build/git processes are alive and their
          # CPU% (a 0% process = blocked on I/O or a credential prompt); when a git network
          # helper is found it captures a stack `sample`. Uploaded on always() so a killed
          # step still leaves evidence.
          nohup bash -c '
            while true; do
              echo "--- $(date -u +%H:%M:%SZ) ---" >> /tmp/ci-diag.log
              ps -axww -o pid,etime,%cpu,comm | grep -E "xcodebuild|swift|clang| git|git-remote" | grep -v grep >> /tmp/ci-diag.log 2>&1
              for P in $(pgrep -f "git-remote-https" 2>/dev/null); do
                echo "== sample git helper $P ==" >> /tmp/ci-diag.log
                sample "$P" 1 -mayDie >> /tmp/ci-diag.log 2>&1 || true
              done
              sleep 30
            done
          ' >/dev/null 2>&1 &
          echo $! > /tmp/hb.pid
          echo "heartbeat started (pid $(cat /tmp/hb.pid)) → /tmp/ci-diag.log"

      - name: Resolve packages
        working-directory: FortAbodeUtilityCentral
        timeout-minutes: 6
        run: |
          set -x
          # The macOS runner has NO `timeout` binary — the old `timeout 240 xcodebuild`
          # exited 127 instantly, so the resolve never ran and the old gate trusted the
          # committed Package.resolved. That left the REAL private-SPM clone to happen
          # (unbounded) inside Archive — the 6h hang. Fix: bound the step with
          # timeout-minutes and let xcodebuild actually resolve. GIT_TERMINAL_PROMPT=0
          # turns an auth failure into a fast error instead of an infinite prompt wait.
          set +e
          xcodebuild -project FortAbodeUtilityCentral.xcodeproj \
            -scheme "$SCHEME" \
            -resolvePackageDependencies
          RC=$?
          set -e

          echo "=== git URL rewrites in effect (PAT auto-redacted by Actions) ==="
          git config --global --get-regexp '^url\.' || true
          CHECKOUTS=$(find "$HOME/Library/Developer/Xcode/DerivedData" -type d -path '*/SourcePackages/checkouts' 2>/dev/null | head -1)
          echo "=== SourcePackages/checkouts after resolve (${CHECKOUTS:-none}) ==="
          ls -la "$CHECKOUTS" 2>/dev/null || echo "(no checkouts dir)"

          # REAL success gate. Package.resolved is committed to the repo, so it is ALWAYS
          # on disk after checkout — the old gate (test -f Package.resolved) reported false
          # success even when the clone was killed at the 240s timeout, which is exactly
          # what fed the 6h Archive hang. Require the AlignedDesignSystem source to exist.
          if [ -n "$CHECKOUTS" ] && find "$CHECKOUTS" -maxdepth 1 -iname 'aligneddesignsystem*' | grep -q .; then
            echo "AlignedDesignSystem checkout present — resolve genuinely succeeded"
            exit 0
          fi
          echo "::error::AlignedDesignSystem was NOT cloned (xcodebuild exit $RC). Resolve hung or auth failed — see git rewrites above."
          exit 1

      - name: Archive
        working-directory: FortAbodeUtilityCentral
        timeout-minutes: 25
        run: |
          set -x
          # -disableAutomaticPackageResolution forbids Archive from fetching SPM deps — it
          # must use what the Resolve step already cloned into the shared DerivedData. A
          # missing source then fails instantly instead of the historical 6h private-clone
          # hang. timeout-minutes is the hard ceiling (the macOS runner has no `timeout`
          # binary); on a kill, the always() diagnostics steps below still upload the log.
          xcodebuild archive \
            -project FortAbodeUtilityCentral.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "${{ github.workspace }}/build/FortAbodeUtilityCentral.xcarchive" \
            -onlyUsePackageVersionsFromResolvedFile \
            -disableAutomaticPackageResolution \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="X6LBF9H7M5" \
            CODE_SIGN_STYLE=Manual \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"

      - name: Stop heartbeat + show diagnostics
        if: always()
        run: |
          [ -f /tmp/hb.pid ] && kill "$(cat /tmp/hb.pid)" 2>/dev/null || true
          echo "=== /tmp/ci-diag.log ==="
          cat /tmp/ci-diag.log 2>/dev/null || echo "(no heartbeat log)"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diag
          path: /tmp/ci-diag.log
          if-no-files-found: warn

      - name: Export archive
        working-directory: FortAbodeUtilityCentral
        run: |
          xcodebuild -exportArchive \
            -archivePath "${{ github.workspace }}/build/FortAbodeUtilityCentral.xcarchive" \
            -exportPath "${{ github.workspace }}/build/export" \
            -exportOptionsPlist ExportOptions.plist

      - name: Strip AppleDouble metadata
        run: |
          # v3.12.0 shipped with 160 AppleDouble files inside the signed bundle —
          # likely from AlignedDesignSystem (private SPM dep) being pulled through
          # a Dropbox-origin path that wrote macOS extended attributes.
          # Strip them BEFORE notarize so Gatekeeper's seal check passes.
          APP="${{ github.workspace }}/build/export/$PRODUCT_NAME.app"
          find "$APP" -name "._*" -delete
          find "$APP" -name ".__CodeSignature" -exec rm -rf {} +
          dot_clean -m "$APP"
          xattr -cr "$APP"

      - name: Re-sign exported bundle (post-strip)
        run: |
          # Strip invalidated the previous signature — re-sign with --force --deep
          # so every nested bundle (Sparkle.framework, AlignedDesignSystem.bundle, etc)
          # has a fresh, valid seal that includes ONLY the real code/resources.
          APP="${{ github.workspace }}/build/export/$PRODUCT_NAME.app"
          /usr/bin/codesign --force --deep --options runtime --timestamp \
            --sign "Developer ID Application: Kamren Kennedy (X6LBF9H7M5)" \
            --keychain "$KEYCHAIN_PATH" \
            "$APP"

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          EXPORT_PATH="${{ github.workspace }}/build/export"
          cd "$EXPORT_PATH"

          # Create a temporary zip for notarization
          ditto -c -k --keepParent "$PRODUCT_NAME.app" notarization.zip

          xcrun notarytool submit notarization.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --wait --timeout 30m

          rm notarization.zip

      - name: Staple
        run: |
          xcrun stapler staple "${{ github.workspace }}/build/export/$PRODUCT_NAME.app"

      - name: Verify Gatekeeper acceptance
        run: |
          # KILL SWITCH. Without this, v3.12.0 shipped a bundle that passed
          # `xcrun stapler validate` but failed `spctl --assess` with
          # "a sealed resource is missing or invalid" — Gatekeeper sees the
          # bundle as modified after signing. Refuse to publish if spctl rejects.
          APP="${{ github.workspace }}/build/export/$PRODUCT_NAME.app"
          xcrun stapler validate "$APP"
          spctl --assess --type execute -vv "$APP" 2>&1 | tee /tmp/spctl.log
          grep -q "accepted" /tmp/spctl.log || (echo "::error::Gatekeeper rejected the bundle — refusing to publish" && exit 1)
          codesign --verify --deep --strict --verbose=4 "$APP"
          # Paranoia: assert the strip step actually held
          if [ "$(find "$APP" -name '._*' | wc -l | tr -d ' ')" != "0" ]; then
            echo "::error::AppleDouble files reappeared after re-sign"
            exit 1
          fi

      - name: Create distribution zip
        run: |
          ZIP_NAME="FortAbodeUtilityCentral-v${VERSION}.zip"
          cd "${{ github.workspace }}/build/export"
          ditto -c -k --keepParent "$PRODUCT_NAME.app" "${{ github.workspace }}/${ZIP_NAME}"
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "ZIP_PATH=${{ github.workspace }}/${ZIP_NAME}" >> $GITHUB_ENV

      - name: EdDSA sign
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        run: |
          # Find sign_update in SPM-resolved Sparkle artifacts
          SPARKLE_BIN=$(find ~/Library/Developer/Xcode/DerivedData \
            -path "*/artifacts/sparkle/Sparkle/bin/sign_update" -print -quit 2>/dev/null)

          if [ -z "$SPARKLE_BIN" ]; then
            echo "::error::sign_update not found in DerivedData"
            exit 1
          fi

          # Write key to temp file — -s flag is deprecated in newer Sparkle
          KEY_FILE=$(mktemp)
          echo "$SPARKLE_KEY" > "$KEY_FILE"
          SIGN_OUTPUT=$("$SPARKLE_BIN" "$ZIP_PATH" --ed-key-file "$KEY_FILE")
          rm -f "$KEY_FILE"
          echo "sign_update output: $SIGN_OUTPUT"

          ED_SIGNATURE=$(echo "$SIGN_OUTPUT" | grep -o 'sparkle:edSignature="[^"]*"' | sed 's/sparkle:edSignature="//;s/"//')
          LENGTH=$(echo "$SIGN_OUTPUT" | grep -o 'length="[^"]*"' | sed 's/length="//;s/"//')

          if [ -z "$ED_SIGNATURE" ] || [ -z "$LENGTH" ]; then
            echo "::error::Failed to parse sign_update output"
            echo "Raw output was: $SIGN_OUTPUT"
            exit 1
          fi

          echo "ED_SIGNATURE=${ED_SIGNATURE}" >> $GITHUB_ENV
          echo "ZIP_LENGTH=${LENGTH}" >> $GITHUB_ENV

      - name: Update appcasts
        # Publish step — only on a version tag. workflow_dispatch (diagnostics) skips it.
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python3 << 'PYEOF'
          import os
          from datetime import datetime, timezone, timedelta

          version = os.environ["VERSION"]
          build = os.environ["BUILD_NUMBER"]
          sig = os.environ["ED_SIGNATURE"]
          length = os.environ["ZIP_LENGTH"]
          tag = f"v{version}"

          cdt = timezone(timedelta(hours=-5))
          pub_date = datetime.now(cdt).strftime("%a, %d %b %Y %H:%M:%S %z")

          download_url = f"https://github.com/kamrenkennedy/FortAbodeUtilityCentral/releases/download/{tag}/FortAbodeUtilityCentral-{tag}.zip"
          release_url = f"https://github.com/kamrenkennedy/FortAbodeUtilityCentral/releases/tag/{tag}"

          new_item = f"""        <item>
              <title>{version}</title>
              <pubDate>{pub_date}</pubDate>
              <sparkle:version>{build}</sparkle:version>
              <sparkle:shortVersionString>{version}</sparkle:shortVersionString>
              <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
              <sparkle:releaseNotesLink>{release_url}</sparkle:releaseNotesLink>
              <enclosure url="{download_url}" sparkle:edSignature="{sig}" length="{length}" type="application/octet-stream"/>
          </item>"""

          for path in ["appcast.xml", "FortAbodeUtilityCentral/appcast.xml"]:
              with open(path, "r") as f:
                  content = f.read()

              # Insert after </title> in <channel>
              channel_start = content.find("<channel>")
              title_end = content.find("</title>", channel_start)
              insert_pos = content.find("\n", title_end) + 1

              new_content = content[:insert_pos] + new_item + "\n" + content[insert_pos:]

              with open(path, "w") as f:
                  f.write(new_content)

              print(f"Updated {path}")
          PYEOF

      - name: Commit appcast updates
        # Publish step — only on a version tag. workflow_dispatch (diagnostics) skips it.
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked
          git checkout main
          git pull --rebase origin main
          git stash pop
          git add appcast.xml FortAbodeUtilityCentral/appcast.xml
          git commit -m "Update appcast for v${VERSION}"
          git push origin main

      - name: Create GitHub Release
        # Publish step — only on a version tag. workflow_dispatch (diagnostics) skips it.
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${VERSION}" \
            "$ZIP_PATH" \
            --title "v${VERSION}" \
            --generate-notes

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
