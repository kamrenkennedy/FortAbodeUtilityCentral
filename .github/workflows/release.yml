name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    env:
      SCHEME: FortAbodeUtilityCentral
      PRODUCT_NAME: "Fort Abode Utility Central"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          YML_VERSION=$(grep 'MARKETING_VERSION:' FortAbodeUtilityCentral/project.yml | sed 's/.*"\(.*\)"/\1/')
          BUILD_NUMBER=$(grep 'CURRENT_PROJECT_VERSION:' FortAbodeUtilityCentral/project.yml | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG" != "$YML_VERSION" ]; then
            echo "::error::Tag v${TAG} does not match project.yml version ${YML_VERSION}"
            exit 1
          fi
          echo "VERSION=${TAG}" >> $GITHUB_ENV
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> $GITHUB_ENV
          echo "Validated: v${TAG} (build ${BUILD_NUMBER})"

      - name: Set up code signing
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$P12_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm $RUNNER_TEMP/cert.p12

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=${KEYCHAIN_PASSWORD}" >> $GITHUB_ENV

      - name: Resolve packages
        working-directory: FortAbodeUtilityCentral
        run: |
          xcodebuild -project FortAbodeUtilityCentral.xcodeproj \
            -scheme "$SCHEME" \
            -resolvePackageDependencies

      - name: Archive
        working-directory: FortAbodeUtilityCentral
        run: |
          xcodebuild archive \
            -project FortAbodeUtilityCentral.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "${{ github.workspace }}/build/FortAbodeUtilityCentral.xcarchive" \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="X6LBF9H7M5" \
            CODE_SIGN_STYLE=Manual \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"

      - name: Export archive
        working-directory: FortAbodeUtilityCentral
        run: |
          xcodebuild -exportArchive \
            -archivePath "${{ github.workspace }}/build/FortAbodeUtilityCentral.xcarchive" \
            -exportPath "${{ github.workspace }}/build/export" \
            -exportOptionsPlist ExportOptions.plist

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          EXPORT_PATH="${{ github.workspace }}/build/export"
          cd "$EXPORT_PATH"

          # Create a temporary zip for notarization
          ditto -c -k --keepParent "$PRODUCT_NAME.app" notarization.zip

          xcrun notarytool submit notarization.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --wait --timeout 30m

          rm notarization.zip

      - name: Staple
        run: |
          xcrun stapler staple "${{ github.workspace }}/build/export/$PRODUCT_NAME.app"

      - name: Create distribution zip
        run: |
          ZIP_NAME="FortAbodeUtilityCentral-v${VERSION}.zip"
          cd "${{ github.workspace }}/build/export"
          ditto -c -k --keepParent "$PRODUCT_NAME.app" "${{ github.workspace }}/${ZIP_NAME}"
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "ZIP_PATH=${{ github.workspace }}/${ZIP_NAME}" >> $GITHUB_ENV

      - name: EdDSA sign
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        run: |
          # Find sign_update in SPM-resolved Sparkle artifacts
          SPARKLE_BIN=$(find ~/Library/Developer/Xcode/DerivedData \
            -path "*/artifacts/sparkle/Sparkle/bin/sign_update" -print -quit 2>/dev/null)

          if [ -z "$SPARKLE_BIN" ]; then
            echo "::error::sign_update not found in DerivedData"
            exit 1
          fi

          # Write key to temp file — -s flag is deprecated in newer Sparkle
          KEY_FILE=$(mktemp)
          echo "$SPARKLE_KEY" > "$KEY_FILE"
          SIGN_OUTPUT=$("$SPARKLE_BIN" "$ZIP_PATH" --ed-key-file "$KEY_FILE")
          rm -f "$KEY_FILE"
          echo "sign_update output: $SIGN_OUTPUT"

          ED_SIGNATURE=$(echo "$SIGN_OUTPUT" | grep -o 'sparkle:edSignature="[^"]*"' | sed 's/sparkle:edSignature="//;s/"//')
          LENGTH=$(echo "$SIGN_OUTPUT" | grep -o 'length="[^"]*"' | sed 's/length="//;s/"//')

          if [ -z "$ED_SIGNATURE" ] || [ -z "$LENGTH" ]; then
            echo "::error::Failed to parse sign_update output"
            echo "Raw output was: $SIGN_OUTPUT"
            exit 1
          fi

          echo "ED_SIGNATURE=${ED_SIGNATURE}" >> $GITHUB_ENV
          echo "ZIP_LENGTH=${LENGTH}" >> $GITHUB_ENV

      - name: Update appcasts
        run: |
          python3 << 'PYEOF'
          import os
          from datetime import datetime, timezone, timedelta

          version = os.environ["VERSION"]
          build = os.environ["BUILD_NUMBER"]
          sig = os.environ["ED_SIGNATURE"]
          length = os.environ["ZIP_LENGTH"]
          tag = f"v{version}"

          cdt = timezone(timedelta(hours=-5))
          pub_date = datetime.now(cdt).strftime("%a, %d %b %Y %H:%M:%S %z")

          download_url = f"https://github.com/kamrenkennedy/FortAbodeUtilityCentral/releases/download/{tag}/FortAbodeUtilityCentral-{tag}.zip"
          release_url = f"https://github.com/kamrenkennedy/FortAbodeUtilityCentral/releases/tag/{tag}"

          new_item = f"""        <item>
              <title>{version}</title>
              <pubDate>{pub_date}</pubDate>
              <sparkle:version>{build}</sparkle:version>
              <sparkle:shortVersionString>{version}</sparkle:shortVersionString>
              <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
              <sparkle:releaseNotesLink>{release_url}</sparkle:releaseNotesLink>
              <enclosure url="{download_url}" sparkle:edSignature="{sig}" length="{length}" type="application/octet-stream"/>
          </item>"""

          for path in ["appcast.xml", "FortAbodeUtilityCentral/appcast.xml"]:
              with open(path, "r") as f:
                  content = f.read()

              # Insert after </title> in <channel>
              channel_start = content.find("<channel>")
              title_end = content.find("</title>", channel_start)
              insert_pos = content.find("\n", title_end) + 1

              new_content = content[:insert_pos] + new_item + "\n" + content[insert_pos:]

              with open(path, "w") as f:
                  f.write(new_content)

              print(f"Updated {path}")
          PYEOF

      - name: Commit appcast updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git pull --rebase origin main
          git add appcast.xml FortAbodeUtilityCentral/appcast.xml
          git commit -m "Update appcast for v${VERSION}"
          git push origin main

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${VERSION}" \
            "$ZIP_PATH" \
            --title "v${VERSION}" \
            --generate-notes

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
