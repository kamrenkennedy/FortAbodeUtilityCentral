name: FortAbodeUtilityCentral
options:
  bundleIdPrefix: com.kamstudios
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: "2.0.0"

targets:
  FortAbodeUtilityCentral:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Models
      - path: Services
      - path: ViewModels
      - path: Views
      - path: Resources/Assets.xcassets
      - path: Resources/component-registry.json
        buildPhase: resources
    dependencies:
      - package: Sparkle
    settings:
      base:
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.kamstudios.fortabodeutilitycentral
        PRODUCT_NAME: "Fort Abode Utility Central"
        MARKETING_VERSION: "2.1.0"
        CURRENT_PROJECT_VERSION: "7"
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_IDENTITY: "Developer ID Application"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: X6LBF9H7M5
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: FortAbodeUtilityCentral.entitlements
        SWIFT_STRICT_CONCURRENCY: targeted
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  FortAbodeUtilityCentralTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: FortAbodeUtilityCentral
    settings:
      base:
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.kamstudios.fortabodeutilitycentral.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Fort Abode Utility Central.app/Contents/MacOS/Fort Abode Utility Central"
        SWIFT_STRICT_CONCURRENCY: targeted
