name: FortAbodeUtilityCentral
options:
  bundleIdPrefix: com.kamstudios
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: "2.0.0"

targets:
  FortAbodeUtilityCentral:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Models
      - path: Services
      - path: ViewModels
      - path: Views
      - path: Resources/Assets.xcassets
      - path: Resources/component-registry.json
        buildPhase: resources
      - path: Resources/gws-client-secret.json
        buildPhase: resources
      - path: Resources/claude-md-template.md
        buildPhase: resources
    dependencies:
      - package: Sparkle
    postCompileScripts:
      - script: |
          if [ "$CONFIGURATION" = "Debug" ]; then
            echo "Skipping EdDSA key validation in Debug builds."
            exit 0
          fi
          SPARKLE_BIN="${BUILD_DIR%Build/*}SourcePackages/artifacts/sparkle/Sparkle/bin"
          EXPECTED_KEY=$("${SPARKLE_BIN}/generate_keys" -p 2>/dev/null | grep -E "^[A-Za-z0-9+/=]{40,}$" | head -1)
          if [ -z "$EXPECTED_KEY" ]; then
            echo "warning: Could not extract EdDSA public key from Keychain — skipping validation"
            exit 0
          fi
          PLIST_KEY=$(/usr/libexec/PlistBuddy -c "Print :SUPublicEDKey" "${TARGET_BUILD_DIR}/${INFOPLIST_PATH}")
          if [ "$EXPECTED_KEY" != "$PLIST_KEY" ]; then
            echo "error: SUPublicEDKey mismatch! Info.plist has '${PLIST_KEY}' but Keychain has '${EXPECTED_KEY}'"
            exit 1
          fi
          echo "EdDSA public key validated successfully."
        name: Validate SUPublicEDKey
        basedOnDependencyAnalysis: false
    settings:
      base:
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.kamstudios.fortabodeutilitycentral
        PRODUCT_NAME: "Fort Abode Utility Central"
        MARKETING_VERSION: "3.2.1"
        CURRENT_PROJECT_VERSION: "14"
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_IDENTITY: "Developer ID Application"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: X6LBF9H7M5
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: FortAbodeUtilityCentral.entitlements
        SWIFT_STRICT_CONCURRENCY: targeted
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  FortAbodeUtilityCentralTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: FortAbodeUtilityCentral
    settings:
      base:
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.kamstudios.fortabodeutilitycentral.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Fort Abode Utility Central.app/Contents/MacOS/Fort Abode Utility Central"
        SWIFT_STRICT_CONCURRENCY: targeted
